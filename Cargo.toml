[package]
name = "fanctl"
version = "0.4.1"
authors = ["Matt Coffin <mcoffin13@gmail.com>"]
edition = "2018"
license = "GPL-3.0"
description = "Fancontrol replacement in Rust with YAML configuration"
documentation = "https://docs.rs/fanctl"
homepage = "https://gitlab.com/mcoffin/fanctl"
repository = "https://gitlab.com/mcoffin/fanctl"
exclude = [ "fanctl.yml", ".gitlab-ci.yml" ]
keywords = [ "fancontrol", "fan", "sysfs", "hwmon" ]

[dependencies]
clap = "2"
serde_yaml = "0.8"
splines = "1.0.0-rc.3"
env_logger = "0.6"
log = "0.4"
combination-err = "^0.1.2"
signal-hook = "0.1"
regex = "^1.3.7"

# [dependencies.ctrlc]
# version = "3"
# features = ["termination"]

[dependencies.serde]
version = "1.0"
features = ["derive"]
