[package]
name = "fanctl"
version = "0.2.1"
authors = ["Matt Coffin <mcoffin13@gmail.com>"]
edition = "2018"
license = "GPL-3.0"
description = "Fancontrol replacement in Rust with YAML configuration"
documentation = "https://docs.rs/fanctl"
homepage = "https://github.com/mcoffin/fanctl"
repository = "https://github.com/mcoffin/fanctl"
exclude = [ "fanctl.yml" ]
keywords = [ "fancontrol", "fan", "sysfs", "hwmon" ]

[dependencies]
clap = "2"
serde_yaml = "0.8"
splines = "1.0.0-rc.3"
ctrlc = "3"
env_logger = "0.6"
log = "0.4"

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.combination-err]
git = "https://gitlab.com/mcoffin/combination-err.git"
