interval: 1000
log_iterations: 10
inputs:
  gpu_temp:
    HwmonSensor:
      path: /sys/class/drm/card0/device/hwmon/hwmon*/temp1_input
outputs:
  gpu_fan:
    PwmFan:
      path: /sys/class/drm/card0/device/hwmon/hwmon*
      name: pwm1
  # gpu_fan:
  #   AmdgpuFan:
  #     path: /sys/class/drm/card0/device/hwmon/hwmon0
  #     prefix: fan1
rules:
  - outputs:
      - gpu_fan
    rule:
      Maximum:
        - GateCritical:
            input: gpu_temp
            value: 1.0
        - Static: 0.4
        - Curve:
            input: gpu_temp
            keys:
              - input: 0.0
                output: 0.0
              - input: 40.0
                output: 0.5
              - input: 50.0
                output: 0.9
              - input: 70
                output: 1.0
